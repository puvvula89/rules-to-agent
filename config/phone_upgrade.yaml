name: phone_upgrade_flow
initial: Auth

states:
  - name: Auth
    objective: "Verify the user is an authorized account holder using the verify_auth tool."
    extract_variables: ["account_context.is_authorized"]

  - name: AccountStandingCheck
    objective: "Check if the account standing is good using the check_standing tool."
    extract_variables: ["account_context.standing"]

  - name: LineToUpgrade
    objective: "Determine which phone line the user wants to upgrade."
    extract_variables: ["line_context.selected_number"]

  - name: CheckLineUpgradeEligibility
    objective: "Check if the selected line is eligible for an upgrade using the backend tool."
    extract_variables: ["line_context.is_eligible"]

  - name: VerifyTradeIn
    objective: "Ask the user if they want to trade in their current device."
    extract_variables: ["trade_in_context.wants_trade_in"]

  - name: DeviceTradeInChecks
    objective: "Ask the user about the physical condition of their trade-in device."
    extract_variables: ["trade_in_context.final_condition"]

  - name: TradeInPricing
    objective: "Get the trade-in quote via the pricing tool based on the final condition."
    extract_variables: ["trade_in_context.quote_value"]

  - name: NewUpgradeDeviceSelection
    objective: "Determine which new device the user wants to purchase."
    extract_variables: ["new_device_context.selection"]

  - name: NewUpgradeDevicePricing
    objective: "Get the pricing for the selected new device using the catalog tool."
    extract_variables: ["new_device_context.price"]

  - name: FinalPricing
    objective: "Calculate final price (New Device Price - Trade In Quote) and present the summary to the user."
    extract_variables: ["order_context.user_confirmed"]

  - name: ProcessOrder
    objective: "Submit the final transaction using the submit_order tool and confirm success with the user."
    extract_variables: ["order_context.order_id", "order_context.error"]

  - name: EndSuccess
    objective: "Thank the user warmly and gracefully end the conversation."
    extract_variables: []

  - name: EndOrderFailed
    objective: "Apologize to the user, explain the order failed, and offer to transfer to a human agent."
    extract_variables: []

  - name: EndUnauthorized
    objective: "Inform the user they are not authorized and end the conversation politely."
    extract_variables: []

  - name: EndBadStanding
    objective: "Inform the user their account standing prevents an upgrade and end the conversation politely."
    extract_variables: []

  - name: EndNotEligible
    objective: "Inform the user the selected line is not eligible for an upgrade at this time."
    extract_variables: []

transitions:
  # Global intents — fire from any state (change-of-mind)
  - trigger: intent_change_line
    source: "*"
    dest: LineToUpgrade
    before: clear_line_memory

  - trigger: intent_change_trade_in_device
    source: "*"
    dest: DeviceTradeInChecks
    before: clear_trade_in_memory

  - trigger: intent_change_new_device
    source: "*"
    dest: NewUpgradeDeviceSelection
    before: clear_new_device_memory

  # Local transitions — all use universal trigger: advance + per-transition condition method
  # Note: condition strings use context['key'].get(...) syntax (simpleeval blocks {} literals)
  - trigger: advance
    source: Auth
    dest: AccountStandingCheck
    condition_string: "context['account_context'].get('is_authorized') == True"

  - trigger: advance
    source: Auth
    dest: EndUnauthorized
    condition_string: "context['account_context'].get('is_authorized') == False"

  - trigger: advance
    source: AccountStandingCheck
    dest: LineToUpgrade
    condition_string: "context['account_context'].get('standing') == 'GOOD'"

  - trigger: advance
    source: AccountStandingCheck
    dest: EndBadStanding
    condition_string: "context['account_context'].get('standing') is not None and context['account_context'].get('standing') != 'GOOD'"

  - trigger: advance
    source: LineToUpgrade
    dest: CheckLineUpgradeEligibility
    condition_string: "context['line_context'].get('selected_number') is not None"

  - trigger: advance
    source: CheckLineUpgradeEligibility
    dest: VerifyTradeIn
    condition_string: "context['line_context'].get('is_eligible') == True"

  - trigger: advance
    source: CheckLineUpgradeEligibility
    dest: EndNotEligible
    condition_string: "context['line_context'].get('is_eligible') == False"

  - trigger: advance
    source: VerifyTradeIn
    dest: DeviceTradeInChecks
    condition_string: "context['trade_in_context'].get('wants_trade_in') == True"

  - trigger: advance
    source: VerifyTradeIn
    dest: NewUpgradeDeviceSelection
    condition_string: "context['trade_in_context'].get('wants_trade_in') == False"

  - trigger: advance
    source: DeviceTradeInChecks
    dest: TradeInPricing
    condition_string: "context['trade_in_context'].get('final_condition') is not None"

  - trigger: advance
    source: TradeInPricing
    dest: NewUpgradeDeviceSelection
    condition_string: "context['trade_in_context'].get('quote_value', -1) >= 0"

  - trigger: advance
    source: NewUpgradeDeviceSelection
    dest: NewUpgradeDevicePricing
    condition_string: "context['new_device_context'].get('selection') is not None"

  - trigger: advance
    source: NewUpgradeDevicePricing
    dest: FinalPricing
    condition_string: "context['new_device_context'].get('price', -1) > 0"

  - trigger: advance
    source: FinalPricing
    dest: ProcessOrder
    condition_string: "context['order_context'].get('user_confirmed') == True"

  - trigger: advance
    source: ProcessOrder
    dest: EndSuccess
    condition_string: "context['order_context'].get('order_id') is not None"

  - trigger: advance
    source: ProcessOrder
    dest: EndOrderFailed
    condition_string: "context['order_context'].get('error') == True"
